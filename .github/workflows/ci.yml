# 基本的なCIについて実装

on:
  push:

  pull_request:
    branches: [main]
    types: [opened]

jobs:
  spellcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false # GitHubトークンが抜き取られるの防ぐための設定
      - uses: crate-ci/typos@7b04f660f4ee4f048d18fd341887cf28dfbedfe2 # v1.46.3
  # 静的解析
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions-rs/cargo@844f36862e911db73fe0815f00a4a2602c279505 # v1
        with:
          command: clippy
          args: -- -D warnings
  # フォーマット確認
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions-rs/cargo@844f36862e911db73fe0815f00a4a2602c279505 # v1
        with:
          command: fmt
          args: --all -- --check
  # ビルド確認
  build:
    needs: [spellcheck, lint, format]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #4
        with:
          persist-credentials: false
      - uses: actions-rs/cargo@844f36862e911db73fe0815f00a4a2602c279505 #v1
        with:
          command: build
          args: --release
  # 本体の #[test] 関数名にテスト命名 lint(lint/ の testname_lints)を適用する。
  # 違反を CI で落とすため、3 つの lint を deny に引き上げて実行する。
  testname-lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # ビルド成果物・レジストリをキャッシュ(lint ライブラリと dylint チェックの再ビルドを短縮)。
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            .
            lint
      # dylint ドライバ(nightly ごとにビルドされる)をキャッシュして再ビルドを省く。
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.dylint_drivers
          key: dylint-drivers-6.0.1-${{ hashFiles('lint/rust-toolchain.toml') }}
      # cargo-dylint / dylint-link 本体をキャッシュ(初回のみソースビルド)。
      # プリビルド配布版はドライバソースのパスがビルド時に焼き込まれ他環境で使えないため
      # cargo install を使い、その成果物バイナリをキャッシュして 2 回目以降を高速化する。
      - name: cache dylint tooling
        id: dylint-bins
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin/cargo-dylint
            ~/.cargo/bin/dylint-link
          key: dylint-bins-${{ runner.os }}-6.0.1
      - name: install dylint tooling
        if: steps.dylint-bins.outputs.cache-hit != 'true'
        run: |
          cargo install cargo-dylint --version 6.0.1 --locked
          cargo install dylint-link --version 6.0.1 --locked
      # lint ライブラリ(cdylib)をビルドする。lint/rust-toolchain.toml の nightly が自動導入される。
      - name: build lint library
        working-directory: lint
        run: cargo build --release
      # 本体の test ターゲットに lint を適用する。--tests で #[test] をコンパイルする。
      # DYLINT_LIBRARY_PATH はディレクトリ(絶対パス必須)を走査し @toolchain 付き
      # 成果物のみを拾う(素の .so はスキップ)。--lib-path はファイル指定用なので使わない。
      # lint は warn 既定。CI では DYLINT_RUSTFLAGS で deny に引き上げて違反を失敗させる
      # (このフラグはドライバが workspace クレートにのみ適用し、依存クレートには波及しない)。
      - name: lint test names
        env:
          DYLINT_LIBRARY_PATH: ${{ github.workspace }}/lint/target/release
          DYLINT_RUSTFLAGS: -D no_test_prefix -D test_name_min_words -D require_behavior_keyword
        run: cargo dylint --all -- --tests
