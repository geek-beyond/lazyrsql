name: Apply issue type and labels

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const body = context.payload.issue.body || '';
            const NO_RESPONSE = '_No response_';

            const TYPE_IDS = {
              Task: 'IT_kwDOC7Foc84BgB-F',
              Bug: 'IT_kwDOC7Foc84BgB-G',
              Feature: 'IT_kwDOC7Foc84BgB-H',
            };

            const sectionRe = (heading) =>
              new RegExp(`###\\s*${heading}\\s*\\n+[\\s\\S]*?(?=\\n###|$)`);
            const extract = (heading) => {
              const m = body.match(sectionRe(heading));
              if (!m) return '';
              return m[0].replace(/^###\s*[^\n]*\n+/, '').trim();
            };

            const stripped = new Set();

            const typeName = extract('Type');
            const typeId = TYPE_IDS[typeName];
            if (typeId) {
              try {
                await github.graphql(`
                  mutation($issueId: ID!, $typeId: ID!) {
                    updateIssueIssueType(input: { issueId: $issueId, issueTypeId: $typeId }) {
                      issue { id }
                    }
                  }
                `, {
                  issueId: context.payload.issue.node_id,
                  typeId,
                });
                stripped.add('Type');
              } catch (e) {
                core.warning(`Failed to apply issue type "${typeName}": ${e.message}`);
              }
            } else if (typeName && typeName !== NO_RESPONSE) {
              core.warning(`Unknown issue type: "${typeName}"`);
            }

            const labelsRaw = extract('ラベル');
            if (labelsRaw && labelsRaw !== NO_RESPONSE) {
              const labels = labelsRaw.split(',').map(s => s.trim()).filter(Boolean);
              if (labels.length) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels,
                });
                stripped.add('ラベル');
              }
            } else if (labelsRaw === NO_RESPONSE) {
              stripped.add('ラベル');
            }

            if (stripped.size > 0) {
              let newBody = body;
              for (const heading of stripped) {
                newBody = newBody.replace(sectionRe(heading), '');
              }
              newBody = newBody.replace(/\n{3,}/g, '\n\n').trimEnd() + '\n';
              if (newBody !== body) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: newBody,
                });
              }
            }
